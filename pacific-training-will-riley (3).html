54x2WF1_Suc?si=pbcqT3VEyTYZ2dcR","supersetGroup":"mqn9fuvdfybflyrg3eu"}]}]},"6":{"label":"","sessions":[{"id":"mqpkre9g02mdt24af8g1","name":"push ","sessionType":"strength","exercises":[{"id":"mqpkrkewj0b4acmo5hi","muscleGroup":"Traps","exercise":"DB Shoulder shrugs","sets":"","reps":"","coachNotes":"","videoUrl":"https://youtube.com/shorts/rFsSeClGnNA?si=9h4GE2sRmIVOnyz8"},{"id":"mqpkrn7uejyrirhyz9j","muscleGroup":"Shoulders","exercise":"DB Lateral raise","sets":"","reps":"","coachNotes":"","videoUrl":"https://youtube.com/shorts/Kl3LEzQ5Zqs?si=kT3RqaM9eVTW40cu"}]}]}}};
let prog=null,curW=1,asTimer;
const MC={chest:'#ff6b35',back:'#00d4ff',legs:'#00e676',shoulders:'#ffd600',arms:'#c084fc',core:'#f87171',glutes:'#fb923c',cardio:'#f0abfc',hamstrings:'#4ade80',quads:'#22d3ee',calves:'#a3e635',biceps:'#e879f9',triceps:'#818cf8',default:'#6b7894'};
const gc=mg=>MC[(mg||'').toLowerCase().trim()]||MC.default;
function syncBar(msg,hide){const e=document.getElementById('sync-bar');e.textContent=msg;e.style.display=msg?'':'none';if(hide)setTimeout(()=>e.style.display='none',hide);}
function getW(w){try{return JSON.parse(localStorage.getItem('pt_w_'+BIN+'_'+w)||'{}')}catch(e){return{}}}
function setW(w,d){localStorage.setItem('pt_w_'+BIN+'_'+w,JSON.stringify(d))}
function markTabs(){for(let w=1;w<=8;w++){const t=document.querySelector('.wtab[data-w="'+w+'"]');if(t&&prog?.weeks?.[w])t.classList.add('has-data');}}
function showWeek(w){flush();curW=w;document.querySelectorAll('.wtab').forEach(b=>b.classList.toggle('active',+b.dataset.w===w));render(w);}

function renderExercises(s,si,wts){
  let h='<div class="ex-cards">';
  if(!s.exercises?.length){h+='<p style="color:#6b7894;padding:10px 0;">No exercises in this session yet.</p>';return h+'</div>';}
  const isCardio=s.sessionType==='cardio';
  const SS_COLS=['#00d4ff','#ff6b35','#00e676','#ffd600','#c084fc','#f87171'];
  const ssInfo={};let ssIdx=0;
  (s.exercises||[]).forEach(e=>{if(e.supersetGroup&&!ssInfo[e.supersetGroup]){ssInfo[e.supersetGroup]={color:SS_COLS[ssIdx%SS_COLS.length],letter:String.fromCharCode(65+ssIdx)};ssIdx++;}});
  const ssCount={};
  (s.exercises||[]).forEach(e=>{if(e.supersetGroup)ssCount[e.supersetGroup]=(ssCount[e.supersetGroup]||0)+1;});
  const ssMulti=Object.keys(ssInfo).length>1;
  (s.exercises||[]).forEach((ex,ei)=>{
    const k=si+'_'+ei,sv=wts[k]||{};
    if(isCardio){
      const movList=(ex.movements||[]).map(m=>'<li style="padding:4px 0;color:#e8eaf0;font-size:14px;">'+m.text+'</li>').join('');
      h+='<div class="ex-card" style="border-color:#00e67640;">'
       +'<div class="muscle-badge" style="background:#00e67622;color:#00e676;border:1px solid #00e67655;">🏃 Conditioning</div>'
       +'<div class="ex-name" style="color:#00e676;">'+(ex.blockName||'Block')+'</div>'
       +(ex.blockDetails?'<div style="font-size:13px;color:#b0b8d0;margin-bottom:10px;line-height:1.5;">'+ex.blockDetails+'</div>':'')
       +(movList?'<ul style="padding-left:16px;margin-bottom:10px;list-style:disc;color:#6b7894;">'+movList+'</ul>':'')
       +'<div class="log-section">'
       +'<div class="log-field"><label>Completed?</label><input type="text" placeholder="e.g. Done / 5/6 rds" class="log-input" data-k="'+k+'" data-f="w" value="'+(sv.w||'')+'" oninput="defer()"></div>'
       +'<div class="log-field"><label>My Notes</label><textarea placeholder="How did it feel?" class="log-ta" data-k="'+k+'" data-f="n" oninput="defer()">'+(sv.n||'')+'</textarea></div>'
       +'</div></div>';
    } else {
      const col=gc(ex.muscleGroup);
      const ssI=ex.supersetGroup?ssInfo[ex.supersetGroup]:null;
      const ssN=ex.supersetGroup?ssCount[ex.supersetGroup]:0;
      const ssLab=(ssN===2?'Superset':ssN===3?'Tri-Set':'Giant Set '+ssN+'×')+((ssI&&ssMulti)?(' '+ssI.letter):'');
      h+='<div class="ex-card"'+(ssI?' style="border-color:'+ssI.color+';box-shadow:inset 5px 0 0 0 '+ssI.color+';"':'')+'>'
       +(ssI?'<div style="display:inline-block;background:'+ssI.color+';color:#04121b;font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;padding:3px 9px;border-radius:99px;margin-bottom:8px;">🔗 '+ssLab+'</div>':'')
       +'<div class="muscle-badge" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'55;">'+(ex.muscleGroup||'Exercise')+'</div>'
       +'<div class="ex-name">'+(ex.exercise||'—')+'</div>'
       +'<div class="sets-reps">'+(ex.sets||'–')+' sets × '+(ex.reps||'–')+' reps</div>'
       +(ex.coachNotes?'<div class="coach-notes"><span>📋</span><span>'+ex.coachNotes+'</span></div>':'')
       +(ex.videoUrl?'<a href="'+ex.videoUrl+'" target="_blank" class="video-btn">▶ Watch Video</a>':'')
       +'<div class="log-section">'
       +'<div class="log-field"><label>Weight Used</label><input type="text" placeholder="e.g. 80kg" class="log-input" data-k="'+k+'" data-f="w" value="'+(sv.w||'')+'" oninput="defer()"></div>'
       +'<div class="log-field"><label>My Notes</label><textarea placeholder="How did it feel?" class="log-ta" data-k="'+k+'" data-f="n" oninput="defer()">'+(sv.n||'')+'</textarea></div>'
       +'</div></div>';
    }
  });
  return h+'</div>';
}

function render(w){
  const el=document.getElementById('week-content');
  const wd=prog?.weeks?.[w];
  if(!wd?.sessions?.length){el.innerHTML='<div class="not-ready"><div style="font-size:48px">🏗️</div><div class="nr-title">Week '+w+' coming soon</div><div class="nr-sub">Your coach is still building this week.<br>Check back after your next session!</div></div>';return;}
  const wts=getW(w);
  const lbl=wd.label?'Week '+w+' — '+wd.label:'Week '+w;
  let h='<div class="week-heading">'+lbl+'</div>';
  wd.sessions.forEach((s,si)=>{
    const isCardio=s.sessionType==='cardio';
    const titleColor=isCardio?'#00e676':'#00d4ff';
    const typeBadge=isCardio?'<span style="font-size:10px;font-weight:700;background:#00e67620;color:#00e676;border:1px solid #00e67640;border-radius:99px;padding:2px 8px;margin-left:8px;">🏃 Conditioning</span>':'<span style="font-size:10px;font-weight:700;background:#ff6b3520;color:#ff6b35;border:1px solid #ff6b3540;border-radius:99px;padding:2px 8px;margin-left:8px;">💪 Strength</span>';
    h+='<div class="session-block"><div class="session-title" style="color:'+titleColor+';">'+(s.name||'Session '+(si+1))+typeBadge+'</div>';
    h+=renderExercises(s,si,wts);
    h+='</div>';
  });
  el.innerHTML=h;
}
function defer(){clearTimeout(asTimer);asTimer=setTimeout(flush,1500);}
function flush(){
  clearTimeout(asTimer);
  const d={};
  document.querySelectorAll('[data-k][data-f]').forEach(el=>{if(!d[el.dataset.k])d[el.dataset.k]={};d[el.dataset.k][el.dataset.f]=el.value;});
  setW(curW,d);
}

function saveProgress(){
  flush();
  const s=document.getElementById('save-status');
  s.textContent='💾 Saving...';
  const allLogs={};
  for(let w=1;w<=8;w++){const wl=getW(w);if(Object.values(wl).some(v=>v.w||v.n))allLogs[w]=wl;}
  (async()=>{
    try{
      const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
      const get=await fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:{'X-Master-Key':KEY},signal:ctrl.signal});
      if(!get.ok)throw new Error();
      const cur=(await get.json()).record||{};
      cur.clientLogs=allLogs;cur.logsUpdatedAt=new Date().toISOString();
      await fetch('https://api.jsonbin.io/v3/b/'+BIN,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':KEY},body:JSON.stringify(cur)});
      s.textContent='✅ Synced to coach';
    }catch(e){s.textContent='✅ Saved locally';}
    setTimeout(()=>s.textContent='',4000);
  })();
}

function shareProgress(){
  let r='Progress Report — '+(prog?.clientName||'Athlete')+'\n'+new Date().toLocaleDateString()+'\n'+'─'.repeat(36)+'\n\n';
  let ok=false;
  for(let w=1;w<=8;w++){
    const wd=prog?.weeks?.[w],wts=getW(w);
    if(!wd||!Object.values(wts).some(v=>v.w||v.n))continue;
    ok=true;
    r+='WEEK '+w+(wd.label?' — '+wd.label:'')+'\n';
    wd.sessions?.forEach((s,si)=>{
      const hasEx=(s.exercises||[]).some((ex,ei)=>{const sv=wts[si+'_'+ei]||{};return sv.w||sv.n;});
      if(!hasEx)return;
      r+='  '+(s.name||'Session '+(si+1))+'\n';
      (s.exercises||[]).forEach((ex,ei)=>{const sv=wts[si+'_'+ei]||{};if(!sv.w&&!sv.n)return;r+='    • '+ex.exercise+(sv.w?' — '+sv.w:'')+(sv.n?' | '+sv.n:'')+' \n';});
    });
    r+='\n';
  }
  if(!ok){alert("No weights logged yet! Fill in your weights as you train.");return;}
  function fallback(){
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
    ov.id='pt-report-overlay';
    ov.innerHTML='<div style="background:#1e2330;border:1px solid #2a3040;border-radius:12px;padding:20px;width:100%;max-width:500px;"><div style="font-weight:700;margin-bottom:12px;font-size:15px;">📋 Copy this and send to your coach</div><textarea style="width:100%;height:220px;background:#0d0f14;border:1px solid #2a3040;border-radius:8px;color:#e8eaf0;padding:10px;font-size:11px;font-family:monospace;">'+r+'</textarea><button onclick="document.getElementById(\'pt-report-overlay\').remove()" style="margin-top:12px;background:#00d4ff;color:#000;border:none;border-radius:8px;padding:10px 24px;font-weight:700;cursor:pointer;width:100%;">Close</button></div>';
    document.body.appendChild(ov);
  }
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(r).then(()=>alert('Copied to clipboard! 📋\nPaste it in a WhatsApp or email to your coach.')).catch(fallback);}else{fallback();}
}

async function init(){
  // Use embedded program data if available (no internet needed)
  if(EMBEDDED){prog=EMBEDDED;render(curW);markTabs();syncBar('',0);return;}
  // Otherwise try to fetch from JSONBin
  const cached=localStorage.getItem('pt_prog_'+BIN);
  if(cached){try{prog=JSON.parse(cached);render(1);markTabs();}catch(e){}}
  syncBar(prog?'🔄 Checking for updates...':'⏳ Loading your program...');
  try{
    if(!BIN||BIN==='undefined')throw new Error('No program ID — ask your coach to resend the file.');
    if(!KEY||KEY==='undefined')throw new Error('Missing key — ask your coach to resend the file.');
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),10000);
    const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:{'X-Master-Key':KEY},signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)throw new Error('Server error '+r.status+' — ask your coach to check their JSONBin key.');
    const j=await r.json();
    prog=j.record;
    localStorage.setItem('pt_prog_'+BIN,JSON.stringify(prog));
    render(curW);markTabs();
    syncBar('✅ Program up to date',3000);
  }catch(e){
    const msg=e.name==='AbortError'?'❌ Connection timed out. Check your internet and tap a week tab to retry.':'❌ '+e.message;
    syncBar(msg,prog?5000:0);
    if(prog){render(curW);markTabs();}
  }
}
init();
</script></body></html>
