<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pacific Training — Joyce Chapman</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0f14;color:#e8eaf0;min-height:100vh;padding-bottom:84px;}
.header{background:#161a22;border-bottom:1px solid #2a3040;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{font-size:17px;font-weight:800;color:#00d4ff;letter-spacing:-0.5px;}.logo span{color:#e8eaf0;}
.hname{font-size:14px;font-weight:700;color:#e8eaf0;}
.sync-bar{background:#1e2330;border-bottom:1px solid #2a3040;padding:8px 20px;font-size:12px;color:#6b7894;text-align:center;}
.week-tabs{display:flex;overflow-x:auto;background:#161a22;border-bottom:1px solid #2a3040;padding:0 12px;gap:2px;scrollbar-width:none;}
.week-tabs::-webkit-scrollbar{display:none;}
.wtab{flex:1;min-width:44px;padding:12px 8px;font-size:13px;font-weight:700;color:#6b7894;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.wtab.active{color:#00d4ff;border-bottom-color:#00d4ff;}
.wtab.has-data{color:#b0b8d0;}
.content{max-width:700px;margin:24px auto;padding:0 16px;}
.week-heading{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6b7894;margin-bottom:20px;}
.session-block{margin-bottom:32px;}
.session-title{font-size:18px;font-weight:800;color:#00d4ff;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #2a3040;}
.ex-cards{display:flex;flex-direction:column;gap:14px;}
.ex-card{background:#161a22;border:1px solid #2a3040;border-radius:14px;padding:18px 20px;}
.muscle-badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.ex-name{font-size:20px;font-weight:800;margin-bottom:4px;line-height:1.2;}
.sets-reps{font-size:15px;font-weight:700;color:#00d4ff;margin-bottom:10px;}
.coach-notes{display:flex;align-items:flex-start;gap:8px;background:#1e2330;border-radius:8px;padding:9px 13px;font-size:13px;color:#b0b8d0;line-height:1.5;margin-bottom:10px;}
.video-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,53,0.15);color:#ff6b35;border:1px solid rgba(255,107,53,0.3);border-radius:8px;padding:6px 13px;font-size:13px;font-weight:700;text-decoration:none;margin-bottom:12px;}
.log-section{border-top:1px solid #2a3040;padding-top:12px;margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.log-section{grid-template-columns:1fr;}}
.log-field{display:flex;flex-direction:column;gap:5px;}
.log-field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#6b7894;}
.log-input,.log-ta{background:#1e2330;border:1px solid #2a3040;border-radius:8px;color:#e8eaf0;padding:8px 11px;font-size:14px;font-family:inherit;resize:vertical;width:100%;}
.log-input{height:40px;}.log-ta{min-height:64px;}
.log-input:focus,.log-ta:focus{border-color:#00d4ff;outline:none;}
.not-ready{text-align:center;padding:60px 20px;color:#6b7894;}
.nr-title{font-size:20px;font-weight:700;margin:16px 0 8px;}
.nr-sub{font-size:14px;line-height:1.6;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#161a22;border-top:1px solid #2a3040;padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:12px;z-index:100;flex-wrap:wrap;}
.save-btn{background:#00d4ff;color:#000;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;}
.share-btn{background:#1e2330;color:#e8eaf0;border:1px solid #2a3040;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;}
.save-status{font-size:12px;color:#00e676;font-weight:600;}
</style></head><body>
<div class="header">
  <div class="logo">PACIFIC<span>TRAINING</span></div>
  <div class="hname">Joyce Chapman</div>
</div>
<div class="sync-bar" id="sync-bar">⏳ Loading your program...</div>

<div class="content" id="week-content"></div>
<div class="save-bar">
  <button class="save-btn" onclick="saveProgress()">💾 Save Progress</button>
  <button class="share-btn" onclick="shareProgress()">📋 Share with Coach</button>
  <span class="save-status" id="save-status"></span>
</div>
<script>
const BIN='null';
const KEY='null';
const EMBEDDED={"clientName":"Joyce Chapman","clientId":"mqnged307gsdwf4ht49","updatedAt":"2026-06-21T08:32:28.657Z","weeks":{"1":{"label":"","sessions":[{"id":"mqngehrriuh4pdlu6y","name":"Upper body ","exercises":[{"id":"mqngfzldufybv8wzm6","muscleGroup":"chest","exercise":"bench press","sets":"5","reps":"6","coachNotes":"use the first 2 sets as warmup sets, build the weight up each set","videoUrl":"https://youtube.com/shorts/hWbUlkb5Ms4?si=WV8VSVjuiTwuvxKE","supersetGroup":"mqnggphn8dubw7w7sbc"},{"id":"mqnggbtkhxz82fk8pmi","muscleGroup":"Back","exercise":"Banded pull aparts","sets":"5","reps":"10","coachNotes":"","videoUrl":"https://youtube.com/shorts/SuvO4TBwSu4?si=NvGdEa_iZJeAFmly","supersetGroup":"mqnggphn8dubw7w7sbc"},{"id":"mqngj1ioz8bmx10nihs","muscleGroup":"Back","exercise":"Barbell Bent over row","sets":"4","reps":"6","coachNotes":"","videoUrl":"https://youtu.be/bm0_q9bR_HA?si=KG5yqXaVolwuRl-1","supersetGroup":"mqngnphh1zalsmhlpz"},{"id":"mqngmbspqkpyushmq5a","muscleGroup":"Shoulders","exercise":"Seated DB shoulder press","sets":"4","reps":"6","coachNotes":"","videoUrl":"https://youtube.com/shorts/k6tzKisR3NY?si=XBttFACND2-TsSD4","supersetGroup":"mqngnphh1zalsmhlpz"},{"id":"mqngqi9t393t4je5ezh","muscleGroup":"Chest","exercise":"DB incline bench press","sets":"4","reps":"6","coachNotes":"","videoUrl":"https://youtube.com/shorts/G1mCi5idEbk?si=VnYmy1Nq4h7jQPWN","supersetGroup":"mqngquyoognny38if4"},{"id":"mqngqsggce3uqwp6kcc","muscleGroup":"Shoulders","exercise":"DB Lateral raise","sets":"4","reps":"6","coachNotes":"","videoUrl":"https://youtube.com/shorts/Kl3LEzQ5Zqs?si=kT3RqaM9eVTW40cu","supersetGroup":"mqngquyoognny38if4"},{"id":"mqngr5hembhg8tp1i2c","muscleGroup":"Biceps","exercise":"Incline bench bicep curls","sets":"3","reps":"8","coachNotes":"","videoUrl":"https://youtube.com/shorts/uCUaRFlA9vE?si=04wJ9YZZd5CiIEKS","supersetGroup":"mqngrez1z895u8vby3q"},{"id":"mqngrbikm4fsa9d7nop","muscleGroup":"Biceps","exercise":"Hammer curls","sets":"3","reps":"8","coachNotes":"","videoUrl":"https://youtube.com/shorts/vm0zV_WQerE?si=g8T1VGLr40sRqWr3","supersetGroup":"mqngrez1z895u8vby3q"}]},{"id":"mqnhjk8kvjhmrzettip","name":"TurfAM","sessionType":"cardio","exercises":[{"id":"mqnhjls4473tsagar22","blockName":"AMRAP","blockDetails":"12mins ","movements":[{"id":"mqnhkzuffh8cj8sgwoc","text":"ERG - 250m"},{"id":"mqnhlpvx7zfrx6qw0rj","text":"DB push press - 6 reps"},{"id":"mqnhmf10255ax7r1iirj","text":"DB bent over row - 6 reps"},{"id":"mqnhmus4q7v9p9129t","text":"DB burpee - 6 reps"},{"id":"mqnho3p8xyq4ux5lc8d","text":"Rest - 30 seconds"}]},{"id":"mqnhngrs0wl29r5xu4tf","blockName":"EMOM","blockDetails":"12 mins","movements":[{"id":"mqnhnvrl9k88kply01m","text":"Minute 1 - 10/15 erg cals"},{"id":"mqnhpqth3sfhqwe135w","text":"Minute 2 - 10/15 reps push ups "},{"id":"mqnhqu0m2hjjo2evho3","text":"Minute 3 - 15/20 reps air squat"}]},{"id":"mqnhrxekynlg1ne3xx8","blockName":"AMRAP","blockDetails":"12 mins ","movements":[{"id":"mqnhu6teu09po9amwn","text":"Run or Erg - 200m"},{"id":"mqnhvh40uaivfy0e1yf","text":"Single DB alt snatch - 8 reps E/S"},{"id":"mqnhwoandkn4xs14s5","text":"Single DB deadlift - 8 reps E/S"},{"id":"mqnhzom4dn2tpt65ybm","text":"Single DB Front squat - 8 reps E/S"},{"id":"mqni0csyivhw5oy3jja","text":"Rest - 30 seconds"}]}]},{"id":"mqni0smurankaqgdxl8","name":"Lower body ","sessionType":"strength","exercises":[{"id":"mqni111m7uoxmfk06y7","muscleGroup":"Legs","exercise":"Back squat","sets":"5","reps":"6","coachNotes":"use the first 2 sets to warmup and build the weight","videoUrl":"https://youtube.com/shorts/PPmvh7gBTi0?si=eRJiFeUmqUKRwpDg","supersetGroup":"mqni6rep1q8oedoczr3"},{"id":"mqni6p662u7gzo3rhe3","muscleGroup":"Legs","exercise":"KB Sumo Deadlift","sets":"5","reps":"8","coachNotes":"","videoUrl":"https://youtu.be/odS65TnXgU0?si=HbdBT2D72hT-CRuj","supersetGroup":"mqni6rep1q8oedoczr3"},{"id":"mqni9z69sns9l907sc","muscleGroup":"Hamstrings/Glutes","exercise":"Barbell RDL","sets":"4","reps":"6","coachNotes":"","videoUrl":"https://youtube.com/shorts/5rIqP63yWFg?si=kXFoJZM7IyGSlWjM","supersetGroup":"mqniccymucqlyhggoof"},{"id":"mqnic9pjntlia9rt9ob","muscleGroup":"Legs","exercise":"DB goblet static lunge","sets":"4","reps":"6 E/S","coachNotes":"Try and go as heavy as you can","videoUrl":"https://youtube.com/shorts/GVYIctocZ9c?si=acpN85k2iLuXRbgD","supersetGroup":"mqniccymucqlyhggoof"},{"id":"mqnie6e652y20h7slo8","muscleGroup":"Quads","exercise":"Heel elevated goblet squat","sets":"","reps":"","coachNotes":"Use a 15 or 20kg plate under your heels","videoUrl":"https://youtube.com/shorts/uUUxx3H1QcU?si=rFSRW9SWjmR7qtCN","supersetGroup":"mqnifsmf6woosqc7cbq"},{"id":"mqnifoutky8ys86z02","muscleGroup":"Quads","exercise":"Heel elevated BW squat","sets":"","reps":"","coachNotes":"","videoUrl":"https://youtube.com/shorts/aoJ6zmwV5VE?si=wcZ-FULfpxi4IqF0","supersetGroup":"mqnifsmf6woosqc7cbq"},{"id":"mqnig27tosefnncmwmp","muscleGroup":"Calfs","exercise":"Deficit DB calf raises","sets":"","reps":"","coachNotes":"use a 15 or 20kg plate under your toes for the deficit ","videoUrl":"https://youtu.be/RN--JOTDABU?si=VQFhPBdotE7iNbXX","supersetGroup":"mqnigbfat666nk4lw5"},{"id":"mqnig8i7t3rk0dxlhp","muscleGroup":"Calves","exercise":"BW  Deficit Calf Raise","sets":"","reps":"","coachNotes":"use a 15 or 20kg plate under your toes for the deficit ","videoUrl":"https://youtube.com/shorts/13DU1ikd1vI?si=82E1_2ETsyMmUfqR","supersetGroup":"mqnigbfat666nk4lw5"}]},{"id":"mqnijxu5y9xjwqcdzfb","name":"Run","sessionType":"cardio","exercises":[{"id":"mqnika5nlz250a5gjfd","blockName":"Tempo Run","blockDetails":"RPE = how hard out of 10 it feels \n\n5km or 3 km ","movements":[{"id":"mqnim8xrqhpb8e6ei4","text":"KM 1 - RPE 5"},{"id":"mqnimi7laeuisbu68p","text":"KM 2 - RPE 6"},{"id":"mqnimvfhrel0rtv82xe","text":"KM 3 - RPE 7"},{"id":"mqninq3nd1vw6958tsv","text":"KM 4 - RPE 6"},{"id":"mqninxkm4tvg8kqygxs","text":"KM 5 - RPE 7"}]}]}]}}};
let prog=null,curW=1,asTimer;
const MC={chest:'#ff6b35',back:'#00d4ff',legs:'#00e676',shoulders:'#ffd600',arms:'#c084fc',core:'#f87171',glutes:'#fb923c',cardio:'#f0abfc',hamstrings:'#4ade80',quads:'#22d3ee',calves:'#a3e635',biceps:'#e879f9',triceps:'#818cf8',default:'#6b7894'};
const gc=mg=>MC[(mg||'').toLowerCase().trim()]||MC.default;
function syncBar(msg,hide){const e=document.getElementById('sync-bar');e.textContent=msg;e.style.display=msg?'':'none';if(hide)setTimeout(()=>e.style.display='none',hide);}
function getW(w){try{return JSON.parse(localStorage.getItem('pt_w_'+BIN+'_'+w)||'{}')}catch(e){return{}}}
function setW(w,d){localStorage.setItem('pt_w_'+BIN+'_'+w,JSON.stringify(d))}
function markTabs(){for(let w=1;w<=8;w++){const t=document.querySelector('.wtab[data-w="'+w+'"]');if(t&&prog?.weeks?.[w])t.classList.add('has-data');}}
function showWeek(w){flush();curW=w;document.querySelectorAll('.wtab').forEach(b=>b.classList.toggle('active',+b.dataset.w===w));render(w);}

function renderExercises(s,si,wts){
  let h='<div class="ex-cards">';
  if(!s.exercises?.length){h+='<p style="color:#6b7894;padding:10px 0;">No exercises in this session yet.</p>';return h+'</div>';}
  const isCardio=s.sessionType==='cardio';
  (s.exercises||[]).forEach((ex,ei)=>{
    const k=si+'_'+ei,sv=wts[k]||{};
    if(isCardio){
      const movList=(ex.movements||[]).map(m=>'<li style="padding:4px 0;color:#e8eaf0;font-size:14px;">'+m.text+'</li>').join('');
      h+='<div class="ex-card" style="border-color:#00e67640;">'
       +'<div class="muscle-badge" style="background:#00e67622;color:#00e676;border:1px solid #00e67655;">🏃 Conditioning</div>'
       +'<div class="ex-name" style="color:#00e676;">'+(ex.blockName||'Block')+'</div>'
       +(ex.blockDetails?'<div style="font-size:13px;color:#b0b8d0;margin-bottom:10px;line-height:1.5;">'+ex.blockDetails+'</div>':'')
       +(movList?'<ul style="padding-left:16px;margin-bottom:10px;list-style:disc;color:#6b7894;">'+movList+'</ul>':'')
       +'<div class="log-section">'
       +'<div class="log-field"><label>Completed?</label><input type="text" placeholder="e.g. Done / 5/6 rds" class="log-input" data-k="'+k+'" data-f="w" value="'+(sv.w||'')+'" oninput="defer()"></div>'
       +'<div class="log-field"><label>My Notes</label><textarea placeholder="How did it feel?" class="log-ta" data-k="'+k+'" data-f="n" oninput="defer()">'+(sv.n||'')+'</textarea></div>'
       +'</div></div>';
    } else {
      const col=gc(ex.muscleGroup);
      h+='<div class="ex-card">'
       +'<div class="muscle-badge" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'55;">'+(ex.muscleGroup||'Exercise')+'</div>'
       +'<div class="ex-name">'+(ex.exercise||'—')+'</div>'
       +'<div class="sets-reps">'+(ex.sets||'–')+' sets × '+(ex.reps||'–')+' reps</div>'
       +(ex.coachNotes?'<div class="coach-notes"><span>📋</span><span>'+ex.coachNotes+'</span></div>':'')
       +(ex.videoUrl?'<a href="'+ex.videoUrl+'" target="_blank" class="video-btn">▶ Watch Video</a>':'')
       +'<div class="log-section">'
       +'<div class="log-field"><label>Weight Used</label><input type="text" placeholder="e.g. 80kg" class="log-input" data-k="'+k+'" data-f="w" value="'+(sv.w||'')+'" oninput="defer()"></div>'
       +'<div class="log-field"><label>My Notes</label><textarea placeholder="How did it feel?" class="log-ta" data-k="'+k+'" data-f="n" oninput="defer()">'+(sv.n||'')+'</textarea></div>'
       +'</div></div>';
    }
  });
  return h+'</div>';
}

function render(w){
  const el=document.getElementById('week-content');
  const wd=prog?.weeks?.[1];
  if(!wd?.sessions?.length){el.innerHTML='<div class="not-ready"><div style="font-size:48px">🏗️</div><div class="nr-title">Program coming soon</div><div class="nr-sub">Your coach is still building your program.<br>Check back soon!</div></div>';return;}
  const wts=getW(1);
  let h='';
  wd.sessions.forEach((s,si)=>{
    const isCardio=s.sessionType==='cardio';
    const titleColor=isCardio?'#00e676':'#00d4ff';
    const typeBadge=isCardio?'<span style="font-size:10px;font-weight:700;background:#00e67620;color:#00e676;border:1px solid #00e67640;border-radius:99px;padding:2px 8px;margin-left:8px;">🏃 Conditioning</span>':'<span style="font-size:10px;font-weight:700;background:#ff6b3520;color:#ff6b35;border:1px solid #ff6b3540;border-radius:99px;padding:2px 8px;margin-left:8px;">💪 Strength</span>';
    h+='<div class="session-block"><div class="session-title" style="color:'+titleColor+';">'+(s.name||'Session '+(si+1))+typeBadge+'</div>';
    h+=renderExercises(s,si,wts);
    h+='</div>';
  });
  el.innerHTML=h;
}
function defer(){clearTimeout(asTimer);asTimer=setTimeout(flush,1500);}
function flush(){
  clearTimeout(asTimer);
  const d={};
  document.querySelectorAll('[data-k][data-f]').forEach(el=>{if(!d[el.dataset.k])d[el.dataset.k]={};d[el.dataset.k][el.dataset.f]=el.value;});
  setW(curW,d);
}

function saveProgress(){
  flush();
  const s=document.getElementById('save-status');
  s.textContent='💾 Saving...';
  const wl=getW(1);
  const allLogs=Object.values(wl).some(v=>v.w||v.n)?{1:wl}:{};
  (async()=>{
    try{
      const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
      const get=await fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:{'X-Master-Key':KEY},signal:ctrl.signal});
      if(!get.ok)throw new Error();
      const cur=(await get.json()).record||{};
      cur.clientLogs=allLogs;cur.logsUpdatedAt=new Date().toISOString();
      await fetch('https://api.jsonbin.io/v3/b/'+BIN,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':KEY},body:JSON.stringify(cur)});
      s.textContent='✅ Synced to coach';
    }catch(e){s.textContent='✅ Saved locally';}
    setTimeout(()=>s.textContent='',4000);
  })();
}

function shareProgress(){
  const wts=getW(1);
  let r='Progress Report — '+(prog?.clientName||'Athlete')+'\n'+new Date().toLocaleDateString()+'\n'+'─'.repeat(36)+'\n\n';
  let ok=false;
  const wd=prog?.weeks?.[1];
  if(wd){
    wd.sessions?.forEach((s,si)=>{
      const hasEx=(s.exercises||[]).some((ex,ei)=>{const sv=wts[si+'_'+ei]||{};return sv.w||sv.n;});
      if(!hasEx)return;
      ok=true;
      r+=(s.name||'Session '+(si+1))+'\n';
      (s.exercises||[]).forEach((ex,ei)=>{const sv=wts[si+'_'+ei]||{};if(!sv.w&&!sv.n)return;r+='  • '+ex.exercise+(sv.w?' — '+sv.w:'')+(sv.n?' | '+sv.n:'')+' \n';});
      r+='\n';
    });
  }
  if(!ok){alert("No weights logged yet! Fill in your weights as you train.");return;}
  function fallback(){
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
    ov.id='pt-report-overlay';
    ov.innerHTML='<div style="background:#1e2330;border:1px solid #2a3040;border-radius:12px;padding:20px;width:100%;max-width:500px;"><div style="font-weight:700;margin-bottom:12px;font-size:15px;">📋 Copy this and send to your coach</div><textarea style="width:100%;height:220px;background:#0d0f14;border:1px solid #2a3040;border-radius:8px;color:#e8eaf0;padding:10px;font-size:11px;font-family:monospace;">'+r+'</textarea><button onclick="document.getElementById(\'pt-report-overlay\').remove()" style="margin-top:12px;background:#00d4ff;color:#000;border:none;border-radius:8px;padding:10px 24px;font-weight:700;cursor:pointer;width:100%;">Close</button></div>';
    document.body.appendChild(ov);
  }
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(r).then(()=>alert('Copied to clipboard! 📋\nPaste it in a WhatsApp or email to your coach.')).catch(fallback);}else{fallback();}
}

async function init(){
  // Use embedded program data if available (no internet needed)
  if(EMBEDDED){prog=EMBEDDED;render(1);syncBar('',0);return;}
  // Otherwise try to fetch from JSONBin
  const cached=localStorage.getItem('pt_prog_'+BIN);
  if(cached){try{prog=JSON.parse(cached);render(1);}catch(e){}}
  syncBar(prog?'🔄 Checking for updates...':'⏳ Loading your program...');
  try{
    if(!BIN||BIN==='undefined')throw new Error('No program ID — ask your coach to resend the file.');
    if(!KEY||KEY==='undefined')throw new Error('Missing key — ask your coach to resend the file.');
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),10000);
    const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:{'X-Master-Key':KEY},signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)throw new Error('Server error '+r.status+' — ask your coach to check their JSONBin key.');
    const j=await r.json();
    prog=j.record;
    localStorage.setItem('pt_prog_'+BIN,JSON.stringify(prog));
    render(1);
    syncBar('✅ Program up to date',3000);
  }catch(e){
    const msg=e.name==='AbortError'?'❌ Connection timed out. Check your internet and try again.':'❌ '+e.message;
    syncBar(msg,prog?5000:0);
    if(prog){render(1);}
  }
}
init();
</script></body></html>
